<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - COHÉLISENS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1a3a5c; /* Ton bleu pétrole */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(232, 168, 48, 0.3);
            max-width: 500px;
        }
        h1 { color: #E8A830; font-size: 2.5rem; }
        p { font-size: 1.2rem; line-height: 1.6; margin: 20px 0; }
        .btn-back {
            display: inline-block;
            padding: 12px 25px;
            background-color: #E8A830;
            color: #1a3a5c;
            text-decoration: none;
            font-weight: 700;
            border-radius: 5px;
            margin-top: 20px;
        }
        .icon { font-size: 4rem; color: #E8A830; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-paper-plane"></i></div>
        <h1>Merci pour votre message !</h1>
        <p>Votre demande a bien été transmise.<br>
           Je l'étudie avec attention et je reviens vers vous très rapidement pour échanger sur vos enjeux d'équipe.</p>
        <a href="index.html" class="btn-back">Retour au site</a>
    </div>
</body>
</html>
